<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 260px;
    background: #0a0d14;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
  }
  .header {
    background: #111827;
    border-bottom: 1px solid #1f2d45;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-title { font-size: 13px; font-weight: 700; letter-spacing: .5px; color: #06b6d4; }
  .header-sub { font-size: 11px; color: #64748b; }
  .body { padding: 16px; }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .status-ok  { background: #1e3a2f; border: 1px solid #166534; color: #10b981; }
  .status-err { background: #1f0f0f; border: 1px solid #7f1d1d; color: #ef4444; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok  { background: #10b981; }
  .dot-err { background: #ef4444; }
  .btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    letter-spacing: .3px;
  }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-secondary { background: #1f2d45; color: #94a3b8; margin-top: 8px; }
  .user-info { font-size: 12px; color: #64748b; margin-bottom: 12px; line-height: 1.5; }
  .user-info strong { color: #e2e8f0; }
  .divider { border: none; border-top: 1px solid #1f2d45; margin: 12px 0; }
  .footer { font-size: 11px; color: #475569; text-align: center; padding: 0 16px 14px; line-height: 1.5; }
  .footer a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">NL BROWSER</div>
    <div class="header-sub">Nexus Legacy Companion</div>
  </div>
</div>

<div class="body">
  <div id="status-row" class="status-row status-err">
    <div id="status-dot" class="status-dot dot-err"></div>
    <span id="status-text">Checking session…</span>
  </div>

  <div id="user-info" class="user-info" style="display:none"></div>

  <button id="open-btn" class="btn btn-primary" disabled>Open Dashboard</button>
  <button id="logout-btn" class="btn btn-secondary" style="display:none">Log Out</button>
</div>

<hr class="divider">
<div class="footer">
  Must be logged in to <a href="https://s0.nexuslegacy.space" target="_blank">Nexus Legacy</a> first.
</div>

<script src="config.js"></script>
<script src="popup.js"></script>
</body>
</html>
